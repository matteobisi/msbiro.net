<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>
  
  <!-- Subtle Grid Pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Supply Chain Connections -->
  <g stroke="#334155" stroke-width="2" stroke-dasharray="4 4">
    <line x1="200" y1="315" x2="1000" y2="315" />
    <line x1="400" y1="150" x2="400" y2="480" />
    <line x1="800" y1="150" x2="800" y2="480" />
    <path d="M 200 315 L 400 150 L 800 150 L 1000 315 L 800 480 L 400 480 Z" fill="none" />
  </g>

  <!-- Cloud-Native Nodes (Hexagons) -->
  <g fill="#1e293b" stroke="#6366f1" stroke-width="3">
    <!-- Active/Healthy Nodes -->
    <path d="M 400 120 L 430 135 L 430 165 L 400 180 L 370 165 L 370 135 Z" fill="#4338ca" filter="url(#glow)"/>
    <path d="M 800 120 L 830 135 L 830 165 L 800 180 L 770 165 L 770 135 Z" fill="#4338ca" filter="url(#glow)"/>
    <path d="M 1000 285 L 1030 300 L 1030 330 L 1000 345 L 970 330 L 970 300 Z" fill="#4338ca" filter="url(#glow)"/>
    
    <!-- Zombie/Legacy Nodes (Faded and Glitchy) -->
    <g opacity="0.4">
      <path d="M 200 285 L 230 300 L 230 330 L 200 345 L 170 330 L 170 300 Z" fill="#991b1b" stroke="#ef4444"/>
      <path d="M 400 450 L 430 465 L 430 495 L 400 510 L 370 495 L 370 465 Z" fill="#991b1b" stroke="#ef4444"/>
      <path d="M 800 450 L 830 465 L 830 495 L 800 510 L 770 495 L 770 465 Z" fill="#991b1b" stroke="#ef4444"/>
    </g>
  </g>

  <!-- Central Highlight / Scan Line -->
  <rect x="0" y="310" width="1200" height="10" fill="#6366f1" opacity="0.1" />
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#6366f1" stroke-width="1" opacity="0.5" />

  <!-- Text / Branding (Optional, but clean) -->
  <text x="600" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f8fafc" opacity="0.8">
    STATE OF DEVSECOPS 2026
  </text>
  <text x="600" y="605" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" opacity="0.6">
    VULNERABILITY &amp; SUPPLY CHAIN ANALYSIS
  </text>
</svg>
